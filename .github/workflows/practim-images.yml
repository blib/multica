name: Practim images

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: Full 40-character commit SHA from main
        required: true
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: practim-images-${{ inputs.commit_sha }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout requested commit
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.commit_sha }}
          fetch-depth: 0

      - name: Validate commit
        env:
          COMMIT_SHA: ${{ inputs.commit_sha }}
        run: |
          if [[ ! "$COMMIT_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "commit_sha must be a full lowercase 40-character SHA" >&2
            exit 1
          fi
          actual_sha="$(git rev-parse HEAD)"
          if [[ "$actual_sha" != "$COMMIT_SHA" ]]; then
            echo "checked out $actual_sha instead of $COMMIT_SHA" >&2
            exit 1
          fi
          git fetch origin main
          if ! git merge-base --is-ancestor "$COMMIT_SHA" origin/main; then
            echo "$COMMIT_SHA is not reachable from main" >&2
            exit 1
          fi

  build:
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: backend
            dockerfile: Dockerfile
            image: multica-backend
          - component: web
            dockerfile: Dockerfile.web
            image: multica-web
    steps:
      - name: Checkout requested commit
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.commit_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish backend
        if: matrix.component == 'backend'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ inputs.commit_sha }}
          build-args: |
            VERSION=${{ inputs.commit_sha }}
            COMMIT=${{ inputs.commit_sha }}
          cache-from: type=gha,scope=practim-${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=practim-${{ matrix.component }}

      - name: Build and publish web
        if: matrix.component == 'web'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ inputs.commit_sha }}
          build-args: |
            REMOTE_API_URL=http://backend:8080
            NEXT_PUBLIC_APP_VERSION=${{ inputs.commit_sha }}
          cache-from: type=gha,scope=practim-${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=practim-${{ matrix.component }}
